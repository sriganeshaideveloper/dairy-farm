<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple To-Do List</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #333; }
        .input-group { display: flex; gap: 5px; }
        input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button#add-btn { padding: 8px 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #eee; margin-bottom: 5px; padding: 8px; display: flex; justify-content: space-between; border-radius: 4px; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>To-Do List</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button id="add-btn" onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        const input = document.getElementById('taskInput');
        const taskText = input.value.trim();
        if (taskText === "") return;

        const li = document.createElement('li');
        li.innerHTML = `${taskText} <button class="delete-btn" onclick="this.parentElement.remove()">X</button>`;
        
        document.getElementById('taskList').appendChild(li);
        input.value = ""; // Clear input
    }
</script>

</body>
</html>
